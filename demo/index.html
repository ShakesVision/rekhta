<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rekhta Book Downloader</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
    <script src="./index.js" type="module"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero hero--compact">
        <p class="eyebrow">Rekhta Downloader</p>
        <h1>Proxy-first Rekhta reader.</h1>
        <p>
          Load the actual Rekhta page through a proxy, preview lazily, read fullscreen, and
          export a PDF only when needed.
        </p>

        <div class="status-strip">
          <span class="badge" id="cache-badge">No manifest cached yet</span>
          <div class="status-copy">
            <strong id="progress-label">Idle</strong>
            <p id="status-text" data-tone="muted"></p>
          </div>
        </div>

        <form id="book-form" class="hero-toolbar">
          <input
            id="book-url"
            name="url"
            type="url"
            placeholder="Rekhta book URL"
            autocomplete="off"
          />
          <input
            id="proxy-prefix"
            name="proxy"
            type="text"
            placeholder="Proxy prefix (use {url})"
            autocomplete="off"
          />
          <button id="load-button" type="submit" class="hero-button hero-button--accent">
            Go
          </button>
          <button id="download-button" type="button" class="hero-button" disabled>
            PDF
          </button>
          <button id="cancel-button" type="button" class="hero-button" disabled>
            Stop
          </button>
        </form>
      </section>

      <section class="dashboard">
        <aside class="panel">
          <h2>Book State</h2>

          <div class="meta-list">
            <div class="meta-row">
              <span>Title</span>
              <strong id="meta-title">No book loaded</strong>
            </div>

            <div class="meta-row">
              <span>Author</span>
              <strong id="meta-author">Waiting for manifest</strong>
            </div>

            <div class="meta-row">
              <span>Pages</span>
              <strong id="meta-pages">0 pages</strong>
            </div>
          </div>

          <div class="progress-stack">
            <progress id="task-progress" max="100" value="0"></progress>
          </div>

        </aside>

        <section class="panel preview-panel">
          <h2>Lazy Preview</h2>
          <div id="preview-grid" class="preview-grid"></div>
        </section>
      </section>
    </main>

    <div class="dock-reader">
      <button id="reader-close" type="button" class="dock-icon" aria-label="Close reader">
        x
      </button>
      <button id="reader-prev" type="button" class="dock-icon" aria-label="Previous page">
        &lt;
      </button>
      <label class="dock-pagebox" for="reader-page-input">
        <input id="reader-page-input" type="number" min="1" inputmode="numeric" />
        <span id="reader-page-total">/ 0</span>
      </label>
      <button id="reader-next" type="button" class="dock-icon" aria-label="Next page">
        &gt;
      </button>
    </div>

    <div id="reader-modal" class="reader-modal reader-modal--hidden">
      <div class="reader-shell">
        <div class="reader-stage">
          <img id="reader-image" class="reader-image" alt="" />
        </div>
      </div>
    </div>
  </body>
</html>
